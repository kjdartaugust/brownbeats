<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — BROWNBEATS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="nav">
  <a class="brand" href="/">◆ BROWNBEATS</a>
  <div class="nav-links">
    <a href="/#beats">The store</a>
    <a href="/dashboard">Your beats</a>
    <span id="who" class="who"></span>
    <button id="signOut" class="btn">Sign out</button>
  </div>
</nav>

<main id="main" class="section admin" hidden>
  <h2 class="section-title">Producers <small id="producerCount"></small></h2>
  <div id="producers" class="admin-list"></div>

  <h2 class="section-title" style="margin-top: 48px">
    Everything on the store <small id="beatCount"></small>
  </h2>
  <p class="notice">
    You can remove any beat here, whoever posted it. The producer is not told.
  </p>
  <div id="list" class="admin-list"></div>
</main>

<p id="denied" class="section form-note" hidden>Not allowed.</p>

<script type="module" src="admin.js"></script>
</body>
</html>
